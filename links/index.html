<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NODE [ Creative Lab ]</title>
  <meta name="theme-color" content="#243d32">
  <meta property="og:title" content="NODE [ Creative Lab ]">
  <meta property="og:description" content="Find your true node.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23243d32'/%3E%3Ccircle cx='16' cy='16' r='8' fill='%23fc5c46'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Sans:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: #1e3028;
    }

    /* ─── Page ──────────────────────────────────────────── */
    .page {
      position: relative;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      background-color: #243d32;
      background-image: url('assets/Background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 36px 88px;
    }

    /* ─── Objects image layer ───────────────────────────── */
    /*
      Save the black-background halftone image as:
        links/assets/objects.png
      mix-blend-mode: screen makes the black disappear —
      only the white/cream halftone elements show through.
    */
    .objects-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      mix-blend-mode: screen;
      z-index: 1;
      pointer-events: none;
      opacity: 0.82;
    }

    /* ─── Content (logo + buttons) above objects ────────── */
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── Logo ──────────────────────────────────────────── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 56px;
    }

    .logo-img {
      width: 240px;
      max-width: 80%;
      height: auto;
      display: block;
      margin: 0 auto 12px;
      /* If logo has black bg instead of transparent, uncomment: */
      /* mix-blend-mode: screen; */
    }

    /* Fallback text logo (hidden when image loads) */
    .logo-text-fallback {
      display: none;
    }

    /* ─── Buttons ───────────────────────────────────────── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 64px;
      padding: 16px 32px;
      background-color: #aecbae;
      border-radius: 100px;
      text-decoration: none;
      font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #1a2e24;
      text-align: center;
      line-height: 1.25;
      letter-spacing: 0.01em;
      transition: background-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }

    .link-btn:hover {
      background-color: #bfd9be;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .link-btn:active {
      transform: translateY(0);
      background-color: #9dbf9d;
      box-shadow: none;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- ═══ OBJECTS LAYER ═══════════════════════════════
      To activate: save the halftone image (black bg)
      as  links/assets/objects.png
      The mix-blend-mode: screen makes black invisible.
    ════════════════════════════════════════════════════ -->
    <img class="objects-layer" src="assets/objects.png" alt="">

    <!-- ═══ CONTENT ══════════════════════════════════════ -->
    <div class="content">

      <!-- Logo -->
      <div class="logo-wrap">
        <img
          class="logo-img"
          src="assets/logo.png"
          alt="NODE [ Creative Lab ]"
        >
      </div>

      <!-- Links -->
      <div class="links">
        <a href="https://www.eventbrite.com.au/e/brand-marketing-talks-panel-el-error-mas-caro-del-emprendedor-latino-registration-1988297220510?aff=oddtdtcreator" target="_blank" rel="noopener" class="link-btn">Brand and Marketing Talks</a>
        <a href="https://nodecreativelab.com" target="_blank" rel="noopener" class="link-btn">Visit our website</a>
        <a href="https://www.instagram.com/nodecreativelab/" target="_blank" rel="noopener" class="link-btn">Follow us on Instagram</a>
        <a href="https://www.facebook.com/groups/negociosycreadoresaustralia" target="_blank" rel="noopener" class="link-btn">Latin Community</a>
      </div>

    </div>
  </div>
</body>
</html>
